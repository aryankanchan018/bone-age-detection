# Model configuration
model:
  architecture: "Xception"
  input_shape: [256, 256, 3]
  learning_rate: 0.0001
  
# Training configuration
training:
  epochs: 10
  batch_size: 32
  validation_split: 0.2
  
# Data augmentation
augmentation:
  rotation_range: 20
  zoom_range: 0.15
  brightness_range: [0.8, 1.2]
  width_shift_range: 0.1
  height_shift_range: 0.1
  horizontal_flip: true
  shear_range: 0.05
  
# Paths
paths:
  dataset: "/kaggle/input/rsna-bone-age"
  models: "saved_models"
  logs: "logs"
